version: '3.8'

services:

  # =====================
  # DATABASE
  # =====================
  db:
    image: mysql:8.0
    container_name: todjom_db
    restart: always
    environment:
      MYSQL_DATABASE: todjom_market_db
      MYSQL_USER: todjom_user
      MYSQL_PASSWORD: todjom_password
      MYSQL_ROOT_PASSWORD: root_secure_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

  # =====================
  # BACKEND (Laravel)
  # =====================
  backend:
  build:
    context: ./backend
  container_name: todjom_backend
  working_dir: /var/www
  volumes:
    - ./backend:/var/www
  restart: always
  depends_on:
    - db
  ports:
    - "127.0.0.1:9000:9000"
  networks:
    - app-network
 

  # =====================
  # FRONTEND (build only)
  # =====================
  frontend:
    build:
      context: ./frontend
    container_name: todjom_frontend
    volumes:
      - frontend_build:/app/build
    networks:
      - app-network
    restart: "no"
    command: npm run build

  # =====================
  # NGINX (gateway)
  # =====================
   # =====================
  # NGINX (ENTRYPOINT)
  # =====================
  nginx:
    image: nginx:alpine
    container_name: todjom_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
   

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
  frontend_build: