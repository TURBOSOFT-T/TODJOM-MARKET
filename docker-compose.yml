version: '3.8'

services:

  # =========================
  # 1. FRONTEND (React build)
  # =========================
  frontend:
    build:
      context: ./frontend
    container_name: todjom_frontend
    networks:
      - app-network
    restart: always

  # =========================
  # 2. BACKEND (Laravel PHP-FPM)
  # =========================
  backend:
    build:
      context: ./backend
    container_name: todjom_backend
    volumes:
      - ./backend:/var/www
    networks:
      - app-network
    depends_on:
      - db
    restart: always

  # =========================
  # 3. NGINX (gateway unique)
  # =========================
  nginx:
    image: nginx:alpine
    container_name: todjom_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./frontend/build:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - backend
      - frontend
    restart: always

  # =========================
  # 4. DATABASE
  # =========================
  db:
    image: mysql:8.0
    container_name: todjom_db
    restart: always
    environment:
      MYSQL_DATABASE: todjom_market_db
      MYSQL_USER: todjom_user
      MYSQL_PASSWORD: todjom_password
      MYSQL_ROOT_PASSWORD: root_secure_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata: