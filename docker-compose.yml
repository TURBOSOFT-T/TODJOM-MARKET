version: '3.8'

services:
  # 1. Le Frontend React / Next.js
  frontend:
    build:
      context: ./frontend
      # En option : transmettez l'URL de l'API au moment du build si Next.js l'exige
      args:
        - NEXT_PUBLIC_API_URL=https://todjom.greenlyfes.com/api
    container_name: todjom_frontend
    ports:
      - "3000:3000" # 👈 Corrigé : 3000 vers 3000 (standard pour Node/Next.js)
    environment:
      - NEXT_PUBLIC_API_URL=https://todjom.greenlyfes.com/api # 👈 Forcé ici
    networks:
      - app-network
    restart: always

  # 2. Le Backend Laravel (PHP-FPM)
  backend:
    build:
      context: ./backend
    container_name: todjom_backend
    volumes:
      - ./backend:/var/www
    networks:
      - app-network
    depends_on:
      - db
    restart: always

  # 3. Serveur Web Nginx (Reverse Proxy interne)
  nginx:
    image: nginx:alpine
    container_name: todjom_nginx
    ports:
      - "8000:80" # Accessible par Nginx VPS sur http://127.0.0.1:8000
    volumes:
      - ./backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - backend
    restart: always

  # 4. Base de données MySQL
  db:
    image: mysql:8.0
    container_name: todjom_db
    environment:
      document:
      MYSQL_DATABASE: todjom_market_db
      MYSQL_USER: todjom_user
      MYSQL_PASSWORD: todjom_password
      MYSQL_ROOT_PASSWORD: root_secure_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  dbdata: