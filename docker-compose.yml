version: '3.8'

services:
  # 1. Le Frontend React
  frontend:
    build:
      context: ./frontend
    container_name: todjom_frontend
    ports:
      - "3000:80" # Accessible sur le port 3000
    networks:
      - app-network
    restart: always

  # 2. Le Backend Laravel (PHP-FPM)
  backend:
    build:
      context: ./backend
    container_name: todjom_backend
    volumes:
      - ./backend:/var/www
    networks:
      - app-network
    depends_on:
      - db
    restart: always

  # 3. Serveur Web Nginx (Intermédiaire obligatoire pour PHP-FPM)
  nginx:
    image: nginx:alpine
    container_name: todjom_nginx
    ports:
      - "8000:80" # Votre API Laravel sera accessible sur http://localhost:8000
    volumes:
      - ./backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - backend
    restart: always

  # 4. Base de données MySQL (Sécurisée)
  db:
    image: mysql:8.0
    container_name: todjom_db
    environment:
      MYSQL_DATABASE: todjom_market_db
      MYSQL_USER: todjom_user
      MYSQL_PASSWORD: todjom_password
      MYSQL_ROOT_PASSWORD: root_secure_password
    # Le port 3306 est interne au réseau Docker pour éviter les conflits sur votre VPS
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  dbdata: