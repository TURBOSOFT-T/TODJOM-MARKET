version: "3.9"

services:

  app:
    build: .
    container_name: todjom_backend

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - .:/var/www

    depends_on:
      - mysql

    networks:
      - todjom

  nginx:

    image: nginx:latest

    container_name: todjom_nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - todjom

  mysql:

    image: mysql:8

    container_name: todjom_mysql

    restart: unless-stopped

    environment:

      MYSQL_DATABASE: todjom

      MYSQL_ROOT_PASSWORD: root

      MYSQL_USER: todjom

      MYSQL_PASSWORD: password

    volumes:

      - mysql:/var/lib/mysql

    ports:

      - "3306:3306"

    networks:

      - todjom

volumes:

    mysql:

networks:

    todjom: